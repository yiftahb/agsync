name: windsurf-skills
description: >
  Expert in Windsurf Agent Skills. Use when creating, editing, or troubleshooting Windsurf skills under .windsurf/skills/ or understanding how Cascade discovers, loads, and uses skills.
instructions: |
  # Windsurf Agent Skills

  You are an expert in the Windsurf skill system, which follows the open Agent Skills standard and uses Cascade as the AI agent.

  ## Overview

  Skills help Cascade handle complex, multi-step tasks by bundling instructions, reference scripts, templates, checklists, and other supporting files into folders that Cascade can invoke.

  Cascade uses progressive disclosure: only the skill's name and description are shown to the model by default. The full SKILL.md content and supporting files are loaded only when Cascade decides to invoke the skill (or when the user @mentions it).

  ## Skill Directory Structure

  ```
  .windsurf/skills/
  └── my-skill/
      ├── SKILL.md           # Required: instructions + metadata
      ├── scripts/           # Optional: executable code
      ├── references/        # Optional: documentation loaded on demand
      └── assets/            # Optional: templates, configs, data files
  ```

  ## SKILL.md Format

  Each skill requires a SKILL.md file with YAML frontmatter:

  ```markdown
  ---
  name: deploy-to-production
  description: Guides the deployment process to production with safety checks
  ---

  ## Pre-deployment Checklist
  1. Run all tests
  2. Check for uncommitted changes
  3. Verify environment variables

  ## Deployment Steps
  Follow these steps to deploy safely...
  ```

  ### Frontmatter Fields

  | Field | Required | Description |
  |-------|----------|-------------|
  | name | Yes | Unique identifier. Lowercase letters, numbers, and hyphens only. Displayed in UI and used for @-mentions. |
  | description | Yes | Brief explanation shown to the model to help it decide when to invoke the skill. |

  ## Skill Discovery Directories

  Windsurf loads skills from multiple locations:

  | Location | Scope |
  |----------|-------|
  | `.windsurf/skills/` | Project-level (workspace) |
  | `~/.codeium/windsurf/skills/` | User-level (global) |
  | `.agents/skills/` | Cross-agent compatibility |
  | `.claude/skills/` | Compatibility (if Claude config reading enabled) |

  Enterprise system-level skills:

  | OS | Path |
  |----|------|
  | macOS | `/Library/Application Support/Windsurf/skills/` |
  | Linux/WSL | `/etc/windsurf/skills/` |
  | Windows | `C:\ProgramData\Windsurf\skills\` |

  ## How Skills Are Invoked

  1. **Automatic**: When the user's request matches a skill's `description`, Cascade automatically invokes the skill and uses its instructions and resources.
  2. **Manual**: Type `@skill-name` in the Cascade input to explicitly activate a specific skill.

  The `description` field is key for automatic invocation — write descriptions that clearly explain what the skill does and when it should be used.

  ## Including Supporting Resources

  Place any supporting files in the skill folder alongside SKILL.md. These files become available to Cascade when the skill is invoked:

  ```
  .windsurf/skills/deploy-to-production/
  ├── SKILL.md
  ├── deployment-checklist.md
  ├── rollback-procedure.md
  └── config-template.yaml
  ```

  ## Skills vs Rules vs Workflows

  | | Skills | Rules | Workflows |
  |---|--------|-------|-----------|
  | Purpose | Multi-step procedures with supporting files | Behavioral guidelines | Prompt templates for repeatable tasks |
  | Structure | Folder with SKILL.md + resource files | Single .md file with frontmatter | Single .md file |
  | Invocation | Model decides (progressive disclosure) or @mention | always_on / glob / model_decision / manual | Manual via /slash-command |
  | In system prompt? | No — only name + description until invoked | Depends on activation mode | No — listed as available commands |
  | Best for | Deployments, code review, testing procedures | Coding style, project conventions | One-shot runbooks |

  ## Best Practices

  - Write clear descriptions that help Cascade decide when to invoke the skill
  - Include relevant resources: templates, checklists, and examples
  - Use descriptive names: `deploy-to-staging` is better than `deploy1`
  - Keep the main SKILL.md focused and move detailed reference material to supporting files
  - Use `references/` for long documentation to keep SKILL.md concise

  ## With agsync

  When using agsync, Windsurf skills are generated from `.agsync/skills/` definitions. The `.windsurf/skills` directory is a symlink to `.agents/skills/`, the canonical output location. Running `agsync sync` generates all skill files and creates this symlink automatically.
