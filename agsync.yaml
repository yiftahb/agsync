version: "1"

# ── Global feature togglers ─────────────────────────────────
# Master switches — if false, the feature is off for ALL agents.
# All default to false. Enable only what you need.
features:
  instructions: true
  skills: true
  commands: true
  mcp: true

# ── Content sources ──────────────────────────────────────────
skills:
  - path: .agsync/skills/*

commands:
  - path: .agsync/commands/*

mcp:
  - path: .agsync/mcp/*.yaml

# ── Gitignore management ────────────────────────────────────
# "on"      — add all generated output to .gitignore
# "mcpOnly" — only add MCP config files (default)
# "off"     — don't touch .gitignore
gitignore: on

# ── Agent configuration ──────────────────────────────────────
# Enable features per agent. Unlisted agents stay off entirely.
# Each feature supports:
#   enabled:        bool   — turn the feature on/off
#   destination:    string — override the default output path (optional)
#   merge_strategy: "merge" | "override" — MCP only (optional)
agents:

  # ── Cursor (active) ────────────────────────────────────────
  cursor:
    skills:
      enabled: true
    commands:
      enabled: true
    mcp:
      enabled: true

  # ── Claude Code ────────────────────────────────────────────
  # claude:
